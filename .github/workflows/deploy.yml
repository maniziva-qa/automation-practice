name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          cp -r public site
          touch site/.nojekyll

          REPO_NAME=$(basename -s .git $(git config --get remote.origin.url))
          BASE="/${REPO_NAME}/"
          echo "Base path: ${BASE}"

          # Inject <base href> so absolute paths resolve correctly on GitHub Pages
          find site -name "*.html" | while read f; do
            sed -i "s|<head>|<head>\n  <base href=\"${BASE}\">|" "$f"
          done

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
