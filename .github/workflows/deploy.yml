name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          cp -r public site
          touch site/.nojekyll

          # Derive the repo name → becomes the GitHub Pages sub-path
          # e.g. "automation-practice" → site served at /automation-practice/
          REPO_NAME=$(basename -s .git $(git config --get remote.origin.url))
          BASE="/${REPO_NAME}"
          echo "Rewriting paths for base: ${BASE}"

          # ── HTML files: rewrite root-relative href/src/action attributes ──
          find site -name "*.html" | while read f; do
            # Static assets & navigation links
            sed -i "s|href=\"/|href=\"${BASE}/|g"   "$f"
            sed -i "s|src=\"/|src=\"${BASE}/|g"     "$f"
            sed -i "s|action=\"/|action=\"${BASE}/|g" "$f"
            # JS inline: window.open('/...') — used in frames-windows.html
            sed -i "s|window\.open('/|window.open('${BASE}/|g" "$f"
          done

          # ── JS files: rewrite navigation paths ──────────────────────────
          # Note: fetch('/api/...') is intentionally left unchanged —
          # mock-api.js intercepts based on strUrl.includes('/api/') which
          # works with both the short and fully-qualified URL forms.
          find site -name "*.js" | while read f; do
            sed -i "s|'/pages/|'${BASE}/pages/|g"  "$f"
            sed -i "s|\"/pages/|\"${BASE}/pages/|g" "$f"
            sed -i "s|'/index\.html|'${BASE}/index.html|g" "$f"
          done

          echo "Done. Sample from site/index.html:"
          grep 'href=.*css' site/index.html | head -2

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
