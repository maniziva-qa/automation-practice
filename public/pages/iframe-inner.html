<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Inner iFrame</title>
  <style>
    body { font-family: sans-serif; margin: 0; background: #fff7ed; padding: 14px; font-size: 13px; color: #1e293b; }
    .inner-label { background: #fed7aa; color: #c2410c; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; display: inline-block; margin-bottom: 8px; }
    input { padding: 6px 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 13px; width: 90%; display: block; margin-bottom: 8px; }
    button { padding: 6px 14px; background: #ea580c; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-size: 12px; }
  </style>
</head>
<body>
  <span class="inner-label">INNER FRAME</span>
  <p>Nested iFrame — switch frames twice to reach here.</p>
  <input id="iframe-inner-input" name="innerInput" type="text" placeholder="Nested frame input" data-testid="iframe-inner-input" />
  <button id="iframe-inner-btn" name="innerBtn" data-testid="iframe-inner-btn" onclick="document.getElementById('inner-result').textContent='Inner button clicked!'">Click (Inner)</button>
  <p id="inner-result" data-testid="inner-result" style="margin-top:8px; color:#16a34a; font-weight:600;"></p>
</body>
</html>
